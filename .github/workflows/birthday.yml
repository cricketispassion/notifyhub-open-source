name: Birthday Scheduler
on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based; 5:00 AM IST = 23:30 UTC the previous day
    - cron: '30 23 * * *'
jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - name: Restore Playwright profile cache
        uses: actions/cache@v4
        with:
          path: drivers/whatsapp-playwright/profile
          key: playwright-profile-${{ runner.os }}-v1
          restore-keys: |
            playwright-profile-${{ runner.os }}-
      - name: Install Playwright browsers
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps
      - name: Run worker (Playwright)
        run: |
          python services/worker/main.py --birthdays data/birthdays.csv --driver whatsapp-playwright --schedule --live
