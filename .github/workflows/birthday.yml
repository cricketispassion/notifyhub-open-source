name: Birthday Scheduler
on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-based; 5:00 AM IST = 23:30 UTC the previous day
    - cron: '30 23 * * *'
jobs:
  run-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt
      - run: python services/worker/main.py --birthdays data/birthdays.csv --driver whatsapp-playwright --schedule
